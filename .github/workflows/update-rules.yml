name: Update rule lists

on:
  workflow_dispatch:
  schedule:
    - cron: '17 3 * * 1'
  push:
    paths:
      - '.github/workflows/update-rules.yml'
      - 'scripts/update-rules.mjs'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Generate rule lists
        run: node scripts/update-rules.mjs
      - name: Commit rule lists
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f --ignore-unmatch ChinaDirect.list Apple.list Google.list ChinaIPv4.list ChinaIPv6.list
          git add Surge/ChinaDirect.list Surge/Apple.list Surge/Google.list Surge/ChinaIPv4.list Surge/ChinaIPv6.list
          if git diff --cached --quiet; then
            echo "No rule changes"
          else
            git commit -m "Update Surge rule lists"
            git push
          fi
